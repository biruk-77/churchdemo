name: church
description: "Digital Asrat, Bekuart & Donation Collection for the Ethiopian Orthodox Tewahedo Church"
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.6
  cloud_firestore: ^6.7.1
  firebase_messaging: ^16.4.3
  firebase_storage: ^13.4.5
  firebase_analytics: ^12.4.5

  # State management
  flutter_riverpod: ^3.3.2

  # Navigation
  go_router: ^17.3.0

  # HTTP (payment APIs)
  dio: ^5.7.0

  # Secure local storage
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.3.2

  # Notifications
  flutter_local_notifications: ^22.1.0

  # UI
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.14
  shimmer: ^3.0.0
  pinput: ^6.0.2
  lottie: ^3.1.2

  # Forms
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.0.0

  # PDF receipts
  pdf: ^3.11.1
  printing: ^5.13.1

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.1
  package_info_plus: ^10.2.1
  connectivity_plus: ^7.3.0
  path_provider: ^2.1.4
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

  # assets:           ← uncomment and add files here when you have actual assets
  #   - assets/images/
  #   - assets/icons/
  #   - assets/animations/

  # fonts:
  #   - family: NotoSansEthiopic
  #     fonts:
  #       - asset: assets/fonts/NotoSansEthiopic-Regular.ttf
  #       - asset: assets/fonts/NotoSansEthiopic-Bold.ttf
  #         weight: 700
  # Uncomment after placing font files in assets/fonts/
